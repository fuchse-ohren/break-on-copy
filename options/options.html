<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Break on Copy 使い方</title>
        <link rel="stylesheet" href="options.css" />
    </head>
    <body>
        <main class="page" aria-labelledby="page-title">
            <header class="page-head">
                <div class="dads-heading" data-size="24">
                    <h1 id="page-title" class="dads-heading__heading">Break on Copy - 使い方</h1>
                </div>
            </header>

            <section class="dads-card" aria-labelledby="howto-title">
                <h2 id="howto-title" class="title-sub">使い方</h2>
                <ol class="howto-list">
                    <li>ページ上でコピーしたい文字列を選択します。</li>
                    <li>ショートカットキーを押します（初期値は Shift + C）。</li>
                    <li>不要な連続改行を整えたテキストがコピーされます。</li>
                </ol>
                <p>
                    ショートカットの変更は Firefox 標準の画面で行ってください。<br />
                    <strong>about:addons</strong> → 歯車メニュー →
                    <strong>拡張機能のショートカットを管理</strong>
                </p>
            </section>
        </main>
    </body>
</html>
