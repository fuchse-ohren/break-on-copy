<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Break on Copy 設定</title>
        <link rel="stylesheet" href="options.css" />
    </head>
    <body>
        <main class="page" aria-labelledby="page-title">
            <!-- ページタイトル -->
            <header class="page-head">
                <div class="dads-heading" data-size="24">
                    <h1 class="dads-heading__heading">Break on Copy - 設定</h1>
                </div>
            </header>

            <!-- ショートカットキー -->
            <section class="dads-card" aria-labelledby="shortcut-title">
                <div class="dads-heading" data-size="20">
                    <h2 class="dads-heading__heading">ショートカットキー</h2>
                </div>

                <div class="blank"></div>

                <fieldset class="dads-fieldset">
                    <legend class="dads-legend">組み合わせキー</legend>
                    <div class="check-grid">
                        <label class="dads-checkbox" data-size="sm">
                            <span class="dads-checkbox__checkbox">
                                <input class="dads-checkbox__input" type="checkbox" id="shift" />
                            </span>
                            <span class="dads-checkbox__label">Shift</span>
                        </label>

                        <label class="dads-checkbox" data-size="sm">
                            <span class="dads-checkbox__checkbox">
                                <input class="dads-checkbox__input" type="checkbox" id="ctrl" />
                            </span>
                            <span class="dads-checkbox__label">Ctrl</span>
                        </label>

                        <label class="dads-checkbox" data-size="sm">
                            <span class="dads-checkbox__checkbox">
                                <input class="dads-checkbox__input" type="checkbox" id="alt" />
                            </span>
                            <span class="dads-checkbox__label">Alt</span>
                        </label>

                        <label class="dads-checkbox" data-size="sm">
                            <span class="dads-checkbox__checkbox">
                                <input class="dads-checkbox__input" type="checkbox" id="meta" />
                            </span>
                            <span class="dads-checkbox__label">Meta</span>
                        </label>
                    </div>
                </fieldset>

                <div class="blank"><hr class="dads-divider" data-color="solid-gray-420" data-style="dashed" data-width="1" /></div>

                <div class="input-block">
                    <label for="key" class="input-label">キー（1文字）</label>
                    <p id="readonly-support-text" class="dads-form-control-label__support-text">小文字で入力してください。</p>
                    <span class="dads-input-text">
                        <input id="key" class="dads-input-text__input" type="text" maxlength="1" value="c" data-size="sm" inputmode="text" aria-describedby="key-hint" />
                    </span>
                </div>

                <div class="blank"><hr class="dads-divider" data-color="solid-gray-420" data-style="dashed" data-width="1" /></div>

                <div class="action-row">
                    <button id="save" class="dads-button" data-size="sm" data-type="solid-fill" type="button">保存</button>
                    <p id="msg" class="msg" aria-live="polite"></p>
                </div>
            </section>

            <div class="blank"><hr class="dads-divider" data-color="solid-gray-420" data-style="dashed" data-width="1" /></div>

            <section class="dads-card" aria-labelledby="howto-title">
                <h2 id="howto-title" class="title-sub">使い方</h2>
                <ol class="howto-list">
                    <li>ページ上でコピーしたい文字列を選択します。</li>
                    <li>設定したショートカットキーを押します（初期値は Shift + C）。</li>
                    <li>不要な連続改行を整えたテキストがクリップボードにコピーされます。</li>
                </ol>
            </section>
        </main>

        <script src="options.js"></script>
    </body>
</html>
